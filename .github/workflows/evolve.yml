name: evolve

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      HERMES_CLAUDE_BIN: ${{ secrets.HERMES_CLAUDE_BIN || '' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure git identity
        run: |
          git config user.name "hermes-evolve[bot]"
          git config user.email "hermes-evolve@users.noreply.github.com"

      - name: Run evolve iteration
        run: bun run scripts/evolve.ts

      - name: Push if committed
        if: success()
        run: |
          if [[ -n $(git log "origin/${GITHUB_REF_NAME}..HEAD" --oneline 2>/dev/null) ]]; then
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
